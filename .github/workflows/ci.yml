name: NixOS Config CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Evaluate NixOS Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Add home-manager channel
        run: |
          nix-channel --add https://github.com/nix-community/home-manager/archive/master.tar.gz home-manager
          nix-channel --update

      - name: Syntax check all .nix files
        run: |
          find . -name '*.nix' -not -path './.decapod/*' | sort | while read -r f; do
            echo "  parsing $f"
            nix-instantiate --parse "$f" > /dev/null
          done
          echo "✅ Syntax OK"

      - name: Evaluate system derivation
        run: |
          nix-instantiate '<nixpkgs/nixos>' -A system \
            -I nixos-config=./configuration.nix \
            --show-trace
          echo "✅ System derivation evaluates cleanly"
        timeout-minutes: 15
